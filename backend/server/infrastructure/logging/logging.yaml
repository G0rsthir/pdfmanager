version: 1
disable_existing_loggers: false
formatters:
  default:
    format: "%(asctime)s [%(levelname)s] [%(name)s] %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout
loggers:
  alembic:
    level: DEBUG
    handlers: [console, file]
    propagate: no
    qualname: alembic
  watchfiles.main:
    level: WARN
    handlers: [console, file]
    propagate: no
  aiosqlite:
    level: INFO
    handlers: [console, file]
    propagate: no
  sqlalchemy:
    level: WARN
    handlers: [console, file]
    propagate: no
    qualname: sqlalchemy.engine
root:
  level: DEBUG
  handlers: [console, file]
  propogate: yes