server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Ensure .mjs files are served with correct MIME type
    types {
        application/javascript mjs;
    }
    include /etc/nginx/mime.types;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src * data:; script-src 'self' 'unsafe-inline' 'unsafe-eval';" always;

    # API proxy to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For file uploads
        client_max_body_size 500M;
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
